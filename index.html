<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are you Bored?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            transition: background 1s;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 40px;
            color: #333;
        }

        button {
            background-color: #8e2b23; /* Rosso scuro */
            color: white;
            width: 120px;
            height: 120px; /* Cerchio perfetto */
            font-size: 18px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px #6b1e1a; /* Ombra pulsante */
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:hover {
            transform: scale(1.1);
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px #6b1e1a;
        }
    </style>
</head>
<body>
    <h1>Are you Bored?</h1>
    <button onclick="openGame()">Click me!</button>

    <script>
        // Array di siti di gioco
        const sites = [
            "https://sudoku.com/eng",
            "https://rocketgoal.io/",
            "https://cardgames.io/solitaire/",
            "http://slither.com/io",
            "https://play2048.co/",
            "https://paperio.site/",
            "https://krunker.io/",
            "https://dinosaur-game.io/"
        ];

        function openGame() {
            const randomSite = sites[Math.floor(Math.random() * sites.length)];
            window.open(randomSite, "_blank");
        }
    </script>
</body>
</html>
